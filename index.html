function ScreenCadastro({onGoLogin}){
  const [form,setForm] = useState({nome:'',email:'',setor:'',perfil:'Solicitante',senha:'',confirmar:''});
  const [errors,setErrors] = useState({});
  const [concluido,setConcluido] = useState(false);
  const set = k => ev => setForm(f=>({...f,[k]:ev.target.value}));

  const cadastrar = () => {
    const err={};
    if(!form.nome.trim()) err.nome=true;
    if(!form.email.trim()||!form.email.includes('@')) err.email=true;

function App(){
  const [screen,setScreen] = useState('login');
  const [chamadoAtivo,setChamadoAtivo] = useState(2041);
  const [visitante,setVisitante] = useState(false);
  const go = id=>setScreen(id);
  const entrarVisitante = ()=>{setVisitante(true);go('abrir');};
  const entrarLogin = ()=>{setVisitante(false);go('abrir');};

  const [perf,titulo] = TITULOS[screen]||['',''];
  const naoLogin = !['login','cadastro','abrir_m','meus_m'].includes(screen);

  function renderScreen(){
    switch(screen){
      case 'login':    return e(ScreenLogin,{onEnter:entrarLogin,onGoCadastro:()=>go('cadastro'),onVisitante:entrarVisitante});
      case 'cadastro': return e(ScreenCadastro,{onGoLogin:()=>go('login')});
      case 'abrir':    return e(ScreenAbrir,{onGoMeus:()=>go('meus'),visitante:visitante});
      case 'meus':     return e(ScreenMeus,{onGoAbrir:()=>go('abrir')});
      case 'fila':     return e(ScreenFila,{onAbrirDetalhe:id=>{setChamadoAtivo(id);go('detalhe');}});
      case 'detalhe':  return e(ScreenDetalhe,{chamadoId:chamadoAtivo,onGoFila:()=>go('fila')});
      case 'admin':    return e(ScreenAdmin);
      case 'relatorio':return e(ScreenRelatorio);
      case 'abrir_m':  return e(ScreenAbrirM,{onGoMeusM:()=>go('meus_m')});
      case 'meus_m':   return e(ScreenMeusM);
      default: return null;
    }
  }

  return e('div',{style:{display:'flex',height:'100vh',width:'100%',overflow:'hidden',background:'var(--color-bg)',color:'var(--color-text)'}},
    /* RAIL */
    e('aside',{style:{width:246,flexShrink:0,borderRight:'2px solid var(--color-divider)',display:'flex',flexDirection:'column',background:'var(--color-bg)'}},
      e('div',{style:{padding:'20px 16px 16px',borderBottom:'2px solid var(--color-divider)'}},
        e('div',{style:{fontFamily:'var(--font-heading)',fontWeight:800,fontSize:19,letterSpacing:'-0.02em',lineHeight:1}},
          'CENTRAL',e('span',{style:{color:'var(--color-accent)'}},'·'),'ATENDE'),
        e('div',{style:{fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',color:'color-mix(in srgb,var(--color-text) 50%,transparent)',marginTop:6}},'Sistema de Atendimento')),
      e('nav',{className:'scr',style:{flex:1,overflow:'auto',padding:'8px 0'}},
        NAV_GROUPS.map(grp=>e('div',{key:grp.perfil},
          e('div',{style:{padding:'14px 16px 6px',fontSize:10,fontWeight:800,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--color-accent)',fontFamily:'var(--font-heading)'}},grp.perfil),
          grp.items.map(it=>e('button',{key:it.id,onClick:()=>go(it.id),style:{display:'block',width:'100%',textAlign:'left',background:screen===it.id?'var(--color-accent-100)':'transparent',border:0,borderLeft:`2px solid ${screen===it.id?'var(--color-accent)':'transparent'}`,padding:'8px 16px',fontFamily:'var(--font-body)',fontSize:13,fontWeight:screen===it.id?600:400,color:screen===it.id?'var(--color-accent-800)':'color-mix(in srgb,var(--color-text) 72%,transparent)',cursor:'pointer'}},it.nome))))),
      e('div',{style:{padding:'14px 16px',borderTop:'2px solid var(--color-divider)',fontSize:11,color:'color-mix(in srgb,var(--color-text) 55%,transparent)'}},'Protótipo navegável · CSU01–CSU16')),
    /* MAIN */
    e('main',{style:{flex:1,display:'flex',flexDirection:'column',minWidth:0}},
      e('header',{style:{display:'flex',alignItems:'center',gap:16,padding:'14px 28px',borderBottom:'2px solid var(--color-divider)',flexShrink:0}},
        e('div',{style:{flex:1,minWidth:0}},
          e('div',{style:{fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--color-accent)'}},perf),
          e('h4',{style:{margin:'2px 0 0'}},titulo)),
        naoLogin && e('div',{style:{display:'flex',alignItems:'center',gap:14}},
          !visitante && e('button',{className:'btn btn-icon btn-secondary',title:'Notificações',style:{position:'relative'}},
            e(IcoBell),
            e('span',{style:{position:'absolute',top:5,right:6,width:7,height:7,background:'var(--color-accent)'}})),
          visitante
            ? e('div',{style:{display:'flex',alignItems:'center',gap:10}},
                e('div',{style:{width:34,height:34,background:'var(--color-neutral-500)',color:'var(--color-bg)',display:'grid',placeItems:'center',fontFamily:'var(--font-heading)',fontWeight:800,fontSize:13}},
                  e('svg',{width:16,height:16,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},e('path',{d:'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'}),e('circle',{cx:12,cy:7,r:4}))),
                e('div',{style:{lineHeight:1.2}},
                  e('div',{style:{fontSize:13,fontWeight:600}},'Visitante'),
                  e('div',{style:{fontSize:11,color:'color-mix(in srgb,var(--color-text) 55%,transparent)'}},'Acesso sem cadastro')))
            : e('div',{style:{display:'flex',alignItems:'center',gap:10}},
                e('div',{style:{width:34,height:34,background:'var(--color-accent)',color:'var(--color-bg)',display:'grid',placeItems:'center',fontFamily:'var(--font-heading)',fontWeight:800,fontSize:13}},'MA'),
                e('div',{style:{lineHeight:1.2}},
                  e('div',{style:{fontSize:13,fontWeight:600}},'Marina Alves'),
                  e('div',{style:{fontSize:11,color:'color-mix(in srgb,var(--color-text) 55%,transparent)'}},'Solicitante'))))),
      e('div',{className:'scr',style:{flex:1,overflow:'auto'}},renderScreen())));
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
